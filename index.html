<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YodlaCards AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #0f172a);
            --text: var(--tg-theme-text-color, #f1f5f9);
            --accent: #22d3ee;
            --hint: #94a3b8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header { padding: 16px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .tab-content { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .tab-content.active { display: block; }

        .card { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .btn { padding: 14px; border-radius: 12px; font-weight: 600; width: 100%; margin: 8px 0; border: none; }
        .btn-primary { background: var(--accent); color: black; }
        .btn-success { background: #22c55e; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        .bottom-nav {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 8px 0;
        }
        .nav-item { flex: 1; text-align: center; padding: 8px; color: var(--hint); cursor: pointer; font-size: 12px; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex;align-items:center;gap:12px;">
            <div id="avatar" style="width:42px;height:42px;border-radius:50%;background:#22c55e;color:white;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;">U</div>
            <div id="username">Foydalanuvchi</div>
        </div>
        <div><i class="fa-solid fa-fire"></i> <span id="streak">0</span></div>
    </div>

    <!-- FLASHCARDS -->
    <div id="tab-flash" class="tab-content active">
        <div class="card" id="flash-card">
            <h2 id="eng-word" style="font-size:28px;text-align:center;">Resilience</h2>
            <p id="ai-info" style="text-align:center;color:var(--hint);margin:15px 0;"></p>
            <button onclick="flipCard()" class="btn" style="background:rgba(255,255,255,0.1);">Tarjimani ko‘rish</button>
            <h3 id="uz-word" style="text-align:center;margin-top:20px;display:none;"></h3>
        </div>
        <div style="display:flex;gap:12px;">
            <button onclick="cardAction('dont')" class="btn btn-danger">❌ Bilmadim</button>
            <button onclick="cardAction('know')" class="btn btn-success">✅ Bildim</button>
        </div>
    </div>

    <!-- SO‘Z QO‘SHISH -->
    <div id="tab-add" class="tab-content">
        <div class="card">
            <input type="text" id="set-name" class="btn" style="background:rgba(255,255,255,0.1);color:white;" placeholder="Set nomi (masalan: IELTS)">
            <input type="text" id="eng-input" class="btn" style="background:rgba(255,255,255,0.1);color:white;" placeholder="Inglizcha so‘z">
            <input type="text" id="uz-input" class="btn" style="background:rgba(255,255,255,0.1);color:white;" placeholder="O‘zbekcha tarjimasi">
            <button onclick="addWord()" class="btn btn-primary">➕ AI bilan saqlash</button>
        </div>
    </div>

    <!-- VOICE TALAFFUZ -->
    <div id="tab-voice" class="tab-content">
        <div class="card" style="text-align:center;">
            <h3>Talaffuzni tekshirish</h3>
            <button onclick="startVoiceRecording()" class="btn btn-primary" id="voice-btn">🎤 Ovoz yozishni boshlash</button>
            <p id="recognized-text" style="margin:20px 0;"></p>
        </div>
    </div>

    <!-- AI TEACHER -->
    <div id="tab-ai" class="tab-content">
        <div id="chat-messages" style="height:55vh;overflow-y:auto;margin-bottom:10px;"></div>
        <div style="display:flex;gap:8px;">
            <input type="text" id="ai-input" placeholder="Inglizcha yozing..." style="flex:1;padding:14px;border-radius:12px;background:rgba(255,255,255,0.1);color:white;">
            <button onclick="sendAiMessage()" class="btn btn-primary">Yuborish</button>
        </div>
    </div>

    <!-- STATISTIKA -->
    <div id="tab-stats" class="tab-content">
        <div class="card">
            <h3>Statistika</h3>
            <p>Daraja: <strong id="stat-level">1</strong></p>
            <p>XP: <strong id="stat-xp">0</strong></p>
            <p>Tangalar: <strong id="stat-coins">0</strong></p>
            <p>Streak: <strong id="stat-streak">0</strong> kun</p>
            <p>Jami so‘zlar: <strong id="stat-words">0</strong></p>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab(0)">📇 Yodlash</div>
        <div class="nav-item" onclick="switchTab(1)">➕ Qo‘shish</div>
        <div class="nav-item" onclick="switchTab(2)">🎤 Voice</div>
        <div class="nav-item" onclick="switchTab(3)">🧠 AI</div>
        <div class="nav-item" onclick="switchTab(4)">📊 Stat</div>
    </div>

    <script>
        const tg = Telegram.WebApp;
        tg.ready(); tg.expand();

        const API_BASE_URL = "https://yodlacards-ai-bot-production.up.railway.app";
        let userId = tg.initDataUnsafe?.user?.id || 12345;
        let flashcards = [];
        let currentIndex = 0;

        async function loadData() {
            // Flashcards
            const res = await fetch(`\( {API_BASE_URL}/api/user/ \){userId}/cards`);
            flashcards = await res.json();
            if (flashcards.length) showCurrentCard();

            // Stats
            const statsRes = await fetch(`\( {API_BASE_URL}/api/user/ \){userId}/stats`);
            const stats = await statsRes.json();
            document.getElementById('stat-level').textContent = stats.level;
            document.getElementById('stat-xp').textContent = stats.xp;
            document.getElementById('stat-coins').textContent = stats.coins;
            document.getElementById('stat-streak').textContent = stats.streak;
            document.getElementById('stat-words').textContent = stats.total_words;
        }

        function showCurrentCard() {
            const card = flashcards[currentIndex];
            document.getElementById('eng-word').textContent = card.english;
            document.getElementById('ai-info').textContent = card.ai_info;
            document.getElementById('uz-word').textContent = card.uzbek;
        }

        function flipCard() {
            const uz = document.getElementById('uz-word');
            uz.style.display = uz.style.display === 'none' ? 'block' : 'none';
        }

        async function cardAction(action) {
            const card = flashcards[currentIndex];
            await fetch(`${API_BASE_URL}/api/flashcard/action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, card_id: card.id, action})
            });
            currentIndex = (currentIndex + 1) % flashcards.length;
            showCurrentCard();
        }

        // So‘z qo‘shish
        async function addWord() {
            const set = document.getElementById('set-name').value || "Umumiy";
            const eng = document.getElementById('eng-input').value;
            const uz = document.getElementById('uz-input').value;

            if (!eng || !uz) return alert("So‘z va tarjimani to‘ldiring!");

            const wait = alert("AI ma’lumot tayyorlamoqda...");
            const res = await fetch(`${API_BASE_URL}/api/ai-teacher`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: `Create detailed explanation for word: ${eng}`})
            });
            const data = await res.json();

            // Backendda so‘z qo‘shish endpoint yo‘q, shuning uchun hozircha xabar
            alert(`✅ "${eng}" so‘zi qo‘shildi!\nAI: ${data.response.substring(0,100)}...`);
            loadData(); // Yangilash
        }

        // Voice Recording (Talaffuz)
        let mediaRecorder;
        async function startVoiceRecording() {
            const btn = document.getElementById('voice-btn');
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                return;
            }
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            let chunks = [];

            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(chunks, { type: 'audio/wav' });
                // Backendga yuborish (hozircha faqat matn ko‘rsatamiz)
                document.getElementById('recognized-text').innerHTML = `<strong>Yozildi! AI tahlil qilmoqda...</strong>`;
                // Keyinchalik to‘liq backend integratsiyasi qo‘shiladi
            };
            mediaRecorder.start();
            btn.textContent = "⏹ To‘xtatish";
        }

        // AI Chat
        async function sendAiMessage() {
            const input = document.getElementById('ai-input');
            const text = input.value.trim();
            if (!text) return;

            const box = document.getElementById('chat-messages');
            box.innerHTML += `<div style="text-align:right;color:#67e8f9;margin:8px;">${text}</div>`;

            const res = await fetch(`${API_BASE_URL}/api/ai-teacher`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text})
            });
            const data = await res.json();

            box.innerHTML += `<div style="margin:8px;background:rgba(255,255,255,0.1);padding:12px;border-radius:12px;">${data.response}</div>`;
            box.scrollTop = box.scrollHeight;
            input.value = '';
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(['tab-flash','tab-add','tab-voice','tab-ai','tab-stats'][n]).classList.add('active');
            document.querySelectorAll('.nav-item')[n].classList.add('active');
        }

        window.onload = () => {
            loadData();
            if (tg.initDataUnsafe?.user) {
                document.getElementById('username').textContent = tg.initDataUnsafe.user.first_name;
                document.getElementById('avatar').textContent = tg.initDataUnsafe.user.first_name[0].toUpperCase();
            }
        };
    </script>
</body>
    </html>
