<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YodlaCards AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --tg-theme-bg-color: #0f172a;
            --tg-theme-text-color: #f8fafc;
            --tg-theme-button-color: #38bdf8;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* App Bar */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--tg-theme-button-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* Main Container */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Flashcard Arena (Tinder-style) */
        .card-container {
            width: 100%;
            max-width: 340px;
            height: 400px;
            position: relative;
            perspective: 1000px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card-front {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px);
        }

        .card-back {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, rgba(56, 189, 248, 0.02) 100%);
            backdrop-filter: blur(20px);
            transform: rotateY(180deg);
        }

        .card-tag {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--tg-theme-button-color);
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .word-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .word-definition {
            font-size: 15px;
            color: var(--tg-theme-hint-color);
            line-height: 1.5;
        }

        .word-translation {
            font-size: 26px;
            font-weight: 600;
            color: #10b981;
        }

        /* Controls */
        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            width: 100%;
            max-width: 340px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-dont {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-know {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Bottom Nav Tab */
        .nav-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.02);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: var(--tg-theme-hint-color);
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--tg-theme-button-color);
        }

        .tab-item i {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="user-badge">
            <div class="user-avatar" id="user-avatar">U</div>
            <span id="user-name">Foydalanuvchi</span>
        </div>
        <div>
            <span style="color: #eab308;"><i class="fa-solid fa-fire"></i> <span id="streak-val">5</span> kun</span>
        </div>
    </header>

    <main class="main-content">
        <div class="card-container">
            <div class="flashcard" id="active-card" onclick="flipCard()">
                <div class="card-face card-front">
                    <span class="card-tag">English</span>
                    <h2 class="word-title" id="card-word">Resilience</h2>
                    <p class="word-definition" id="card-def">The capacity to recover quickly from difficulties.</p>
                    <span style="font-size: 13px; color: var(--tg-theme-hint-color);"><i class="fa-solid fa-rotate"></i> Bosib tarjimani ko'ring</span>
                </div>
                <div class="card-face card-back">
                    <span class="card-tag">O'zbekcha</span>
                    <h2 class="word-translation" id="card-trans">Matonat / Chidamlilik</h2>
                    <p style="font-size: 14px; rgba(255,255,255,0.6)">Ushbu so'zni eslab qoldingizmi?</p>
                    <div style="width: 100%;"></div>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-dont" onclick="handleCardAction('dont')">
                <i class="fa-solid fa-xmark"></i> Bilmadim
            </button>
            <button class="btn btn-know" onclick="handleCardAction('know')">
                <i class="fa-solid fa-check"></i> Bildim
            </button>
        </div>
    </main>

    <nav class="nav-tabs">
        <div class="tab-item active">
            <i class="fa-solid fa-layer-group"></i>
            <span>Yodlash</span>
        </div>
        <div class="tab-item" onclick="TgAlert('Tez kunda: Kunlik test tizimi Mini Appga ko\'chiriladi!')">
            <i class="fa-solid fa-brain"></i>
            <span>Test</span>
        </div>
        <div class="tab-item" onclick="TgAlert('Tez kunda: AI Teacher interfeysi shu yerda bo\'ladi!')">
            <i class="fa-solid fa-robot"></i>
            <span>AI Teacher</span>
        </div>
        <div class="tab-item" onclick="TgAlert('Tez kunda: Statistika grafiklarni ko\'ra olasiz!')">
            <i class="fa-solid fa-chart-simple"></i>
            <span>Statistika</span>
        </div>
    </nav>

    <script>
        // Telegram WebApp SDK-ni ishga tushiramiz
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Oynani to'liq ekranga ochish

        // API manzili (Buni o'zingizning FastAPI serveringiz havolasiga almashtirasiz)
        const API_BASE_URL = "http://yodlacards-ai-bot-production.up.railway.app"; 

        // Foydalanuvchi ma'lumotlarini Telegram SDK orqali o'qish
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            if (user.username) {
                document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
            }
        }

        // Flesh-kartalar massivi (API dan kelguncha fallback ma'lumot)
        let flashcards = [
            {word: "Resilience", translation: "Matonat", definition: "The capacity to recover quickly from difficulties."},
            {word: "Ubiquitous", translation: "Hamma yerda mavjud", definition: "Present, appearing, or found everywhere."},
            {word: "Eloquent", translation: "Fasih, chechan", definition: "Fluent or persuasive in speaking or writing."}
        ];
        let currentIndex = 0;

        // Kartani aylantirish (Flip)
        function flipCard() {
            document.getElementById('active-card').classList.toggle('flipped');
            // Telegram tebranish (Haptic Feedback) effekti
            tg.HapticFeedback.impactOccurred('light');
        }

        // Bildim / Bilmadim tugmalari bosilganda
        function handleCardAction(action) {
            // Kuchliroq haptic feedback (Muvaffaqiyat yoki ogohlantirish)
            if (action === 'know') {
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.HapticFeedback.notificationOccurred('warning');
            }

            // Kartani joyiga qaytarish va keyingi so'zga o'tish animatsiyasi
            const cardEl = document.getElementById('active-card');
            cardEl.style.transform = action === 'know' ? 'translateX(200px) rotate(20deg)' : 'translateX(-200px) rotate(-20deg)';
            cardEl.style.opacity = '0';

            setTimeout(() => {
                currentIndex++;
                if (currentIndex >= flashcards.length) {
                    currentIndex = 0; // Tsikl
                }
                
                // Yangi ma'lumotlarni o'rnatish
                document.getElementById('card-word').innerText = flashcards[currentIndex].word;
                document.getElementById('card-def').innerText = flashcards[currentIndex].definition;
                document.getElementById('card-trans').innerText = flashcards[currentIndex].translation;
                
                // Kartani asliga qaytarish
                cardEl.classList.remove('flipped');
                cardEl.style.transform = 'none';
                cardEl.style.opacity = '1';
            }, 300);

            // API ga ma'lumot yuborish (Foydalanuvchi bildimi yoki yo'q, bazaga saqlash uchun)
            if (user?.id) {
                fetch(`${API_BASE_URL}/api/card/action`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: user.id,
                        word: flashcards[currentIndex].word,
                        status: action
                    })
                }).catch(err => console.log("API xatolik:", err));
            }
        }

        // Telegram chiroyli oynasi orqali ogohlantirish chiqarish
        function TgAlert(text) {
            tg.showAlert(text);
        }

        // FastAPI Backendingizdan real ma'lumotlarni yuklab olish funksiyasi
        async function loadUserCards() {
            if (user?.id) {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/user/${user.id}/cards`);
                    const data = await response.json();
                    if (data.status === 'success' && data.cards.length > 0) {
                        flashcards = data.cards;
                        // Birinchi kartani yangilash
                        document.getElementById('card-word').innerText = flashcards[0].word;
                        document.getElementById('card-def').innerText = flashcards[0].definition;
                        document.getElementById('card-trans').innerText = flashcards[0].translation;
                    }
                } catch (error) {
                    console.log("Bazadan ma'lumot olishda xato:", error);
                }
            }
        }

        // Sahifa yuklanganda bazadan kartalarni tortish
        window.onload = loadUserCards;
    </script>
</body>
  </html>
