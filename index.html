<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YodlaCards AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .flashcard { transition: transform 0.9s cubic-bezier(0.23, 1, 0.32, 1); }
        .flashcard.flipped { transform: rotateY(180deg); }
        .nav-item.active { color: #22d3ee; transform: scale(1.1); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-xl border-b border-cyan-400/20 px-5 py-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-3xl flex items-center justify-center text-3xl font-black">Y</div>
                <div>
                    <p id="username" class="text-xl font-bold">Foydalanuvchi</p>
                    <p class="text-xs text-slate-400"><i class="fa-solid fa-fire"></i> <span id="streak">0</span> kun</p>
                </div>
            </div>
            <div class="text-cyan-400">Level <span id="level" class="text-3xl font-bold">1</span></div>
        </div>
    </header>

    <main class="pb-24">

        <!-- 1. YODLASH -->
        <div id="tab-flash" class="tab-content active p-5">
            <div id="set-list" class="space-y-4"></div>
            
            <div id="count-select" class="hidden max-w-md mx-auto glass rounded-3xl p-6">
                <h3 class="text-xl font-bold text-center mb-6">Qancha so‘z yodlamoqchisiz?</h3>
                <div id="count-buttons" class="grid grid-cols-2 gap-3"></div>
            </div>

            <div id="flash-area" class="hidden max-w-md mx-auto">
                <div onclick="flipCard()" id="flashcard" class="flashcard relative h-[460px] cursor-pointer">
                    <div class="face front absolute inset-0 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 flex flex-col justify-center items-center">
                        <div class="px-6 py-2 bg-white/10 rounded-full text-sm">ENGLISH</div>
                        <h1 id="eng-word" class="text-5xl font-bold mt-10 text-center"></h1>
                        <p id="ai-info" class="mt-8 text-center text-slate-200 text-sm"></p>
                    </div>
                    <div class="face back absolute inset-0 bg-gradient-to-br from-emerald-600 to-teal-600 rounded-3xl p-8 flex flex-col justify-center items-center rotate-y-180">
                        <div class="px-6 py-2 bg-white/10 rounded-full text-sm">O‘ZBEKCHA</div>
                        <h1 id="uz-word" class="text-5xl font-bold mt-12 text-white text-center"></h1>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-8">
                    <button onclick="cardAction('dont')" class="glass py-6 rounded-3xl text-red-400 font-semibold">❌ Bilmadim</button>
                    <button onclick="cardAction('know')" class="glass py-6 rounded-3xl text-emerald-400 font-semibold">✅ Bildim</button>
                </div>
            </div>
        </div>

        <!-- 2. SO‘Z QO‘SHISH -->
        <div id="tab-add" class="tab-content hidden p-5">
            <div class="max-w-md mx-auto glass rounded-3xl p-8">
                <h2 class="text-3xl font-bold mb-6 text-center">➕ So‘z qo‘shish</h2>
                <input id="set-name" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-5 mb-4" placeholder="Set nomi">
                <input id="eng-input" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-5 mb-4" placeholder="Inglizcha so‘z">
                <input id="uz-input" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-5 mb-8" placeholder="O‘zbekcha tarjimasi">
                <button onclick="addWordDirect()" class="w-full bg-gradient-to-r from-cyan-400 to-blue-500 text-black font-bold py-6 rounded-3xl text-xl">Saqlash</button>
            </div>
        </div>

        <!-- 3. VOICE -->
        <div id="tab-voice" class="tab-content hidden p-5">
            <div class="max-w-md mx-auto glass rounded-3xl p-12 text-center">
                <button onclick="startVoiceRecording()" id="voice-btn" class="w-40 h-40 rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 text-7xl mx-auto shadow-2xl">🎤</button>
                <p class="mt-8 text-xl">Talaffuzni tekshiring</p>
                <p id="recognized-text" class="mt-6 min-h-[100px] text-slate-300"></p>
            </div>
        </div>

        <!-- 4. AI TEACHER -->
        <div id="tab-ai" class="tab-content hidden p-5">
            <div class="max-w-md mx-auto">
                <div id="chat-messages" class="h-[55vh] overflow-y-auto space-y-4"></div>
                <div class="flex gap-3 glass p-3 rounded-3xl">
                    <input id="ai-input" class="flex-1 bg-slate-800 rounded-2xl px-6 py-4" placeholder="Inglizcha yozing...">
                    <button onclick="sendAiMessage()" class="bg-cyan-500 px-8 rounded-2xl font-bold">Yuborish</button>
                </div>
            </div>
        </div>

        <!-- 5. STATISTIKA -->
        <div id="tab-stats" class="tab-content hidden p-5">
            <div class="max-w-md mx-auto glass rounded-3xl p-8">
                <h2 class="text-3xl font-bold mb-8 text-center">📊 Statistika</h2>
                <div class="space-y-6">
                    <div class="flex justify-between text-lg"><span>Daraja</span><span id="stat-level" class="font-bold text-cyan-400">1</span></div>
                    <div class="flex justify-between text-lg"><span>XP</span><span id="stat-xp" class="font-bold">1240</span></div>
                    <div class="flex justify-between text-lg"><span>Tangalar</span><span id="stat-coins" class="font-bold">245 🪙</span></div>
                    <div class="flex justify-between text-lg"><span>Streak</span><span id="stat-streak" class="font-bold">7 kun 🔥</span></div>
                    <div class="flex justify-between text-lg"><span>Jami so‘zlar</span><span id="stat-words" class="font-bold">68 ta</span></div>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-2xl border-t border-slate-700 flex text-xs">
        <div onclick="switchTab(0)" class="flex-1 py-4 flex flex-col items-center nav-item active"><i class="fa-solid fa-layer-group text-2xl"></i><span>Yodlash</span></div>
        <div onclick="switchTab(1)" class="flex-1 py-4 flex flex-col items-center nav-item"><i class="fa-solid fa-plus text-2xl"></i><span>Qo‘shish</span></div>
        <div onclick="switchTab(2)" class="flex-1 py-4 flex flex-col items-center nav-item"><i class="fa-solid fa-microphone text-2xl"></i><span>Voice</span></div>
        <div onclick="switchTab(3)" class="flex-1 py-4 flex flex-col items-center nav-item"><i class="fa-solid fa-robot text-2xl"></i><span>AI</span></div>
        <div onclick="switchTab(4)" class="flex-1 py-4 flex flex-col items-center nav-item"><i class="fa-solid fa-chart-column text-2xl"></i><span>Stat</span></div>
    </nav>

    <script>
        const API_BASE_URL = "https://yodlacards-ai-bot-production.up.railway.app";
        let userId = Telegram.WebApp.initDataUnsafe?.user?.id || 12345;
        let currentFlashcards = [];
        let currentIndex = 0;

        async function loadSets() {
            const container = document.getElementById('set-list');
            try {
                const res = await fetch(`\( {API_BASE_URL}/api/user/ \){userId}/sets`);
                const sets = await res.json();
                container.innerHTML = sets.map(s => `
                    <div onclick="selectSet('${s.set_name}', ${s.count})" class="glass rounded-3xl p-6 flex justify-between items-center cursor-pointer">
                        <div>
                            <p class="font-semibold text-xl">${s.set_name}</p>
                            <p class="text-slate-400">${s.count} ta so‘z</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-2xl text-cyan-400"></i>
                    </div>
                `).join('');
            } catch(e) { container.innerHTML = "<p class='text-center text-slate-400'>Setlar topilmadi</p>"; }
        }

        function selectSet(setName, totalCount) {
            document.getElementById('set-list').classList.add('hidden');
            const countDiv = document.getElementById('count-select');
            countDiv.classList.remove('hidden');

            const opts = [10, 20, 50, totalCount];
            document.getElementById('count-buttons').innerHTML = opts.map(n => `
                <button onclick="startFlashcards('${setName}', ${n})" class="glass py-6 rounded-2xl text-lg font-medium">
                    ${n === totalCount ? 'Hammasi' : n + ' ta'}
                </button>
            `).join('');
        }

        async function startFlashcards(setName, limit) {
            document.getElementById('count-select').classList.add('hidden');
            document.getElementById('flash-area').classList.remove('hidden');

            try {
                const res = await fetch(`\( {API_BASE_URL}/api/user/ \){userId}/cards?set=\( {setName}&limit= \){limit}`);
                currentFlashcards = await res.json();
                currentIndex = 0;
                showCurrentCard();
            } catch(e) {}
        }

        function showCurrentCard() {
            const c = currentFlashcards[currentIndex];
            document.getElementById('eng-word').textContent = c.english;
            document.getElementById('ai-info').textContent = c.ai_info || "";
            document.getElementById('uz-word').textContent = c.uzbek;
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }

        async function cardAction(action) {
            const c = currentFlashcards[currentIndex];
            await fetch(`${API_BASE_URL}/api/flashcard/action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, card_id: c.id, action})
            });
            currentIndex = (currentIndex + 1) % currentFlashcards.length;
            showCurrentCard();
        }

        async function addWordDirect() {
            const set = document.getElementById('set-name').value || "Umumiy";
            const eng = document.getElementById('eng-input').value.trim();
            const uz = document.getElementById('uz-input').value.trim();
            if (!eng || !uz) return alert("Ma'lumotlarni to'ldiring!");

            await fetch(`\( {API_BASE_URL}/api/user/ \){userId}/add_word`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({set_name: set, english: eng, uzbek: uz})
            });
            alert(`✅ "${eng}" saqlandi!`);
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(['tab-flash','tab-add','tab-voice','tab-ai','tab-stats'][n]).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item')[n].classList.add('active');
        }

        window.onload = () => {
            loadSets();
            if (Telegram.WebApp.initDataUnsafe?.user) {
                document.getElementById('username').textContent = Telegram.WebApp.initDataUnsafe.user.first_name;
            }
        };
    </script>
</body>
</html>
