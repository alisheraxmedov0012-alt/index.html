<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YodlaCards AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(34, 211, 238, 0.15); }
        .flashcard { transition: transform 0.85s cubic-bezier(0.23, 1, 0.32, 1); box-shadow: 0 20px 40px -10px rgb(0 0 0 / 0.6); }
        .flashcard.flipped { transform: rotateY(180deg); }
        .nav-item.active { color: #22d3ee; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-xl border-b border-cyan-400/20 px-5 py-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center text-3xl font-black">Y</div>
                <div>
                    <p id="username" class="text-xl font-bold">Alisher</p>
                    <p class="text-xs text-slate-400 flex items-center gap-1"><i class="fa-solid fa-fire text-orange-400"></i> <span id="streak">0</span> kun</p>
                </div>
            </div>
            <div class="text-right">
                <span class="text-cyan-400 text-sm">Level</span>
                <span id="level" class="text-3xl font-bold text-cyan-400 ml-1">1</span>
            </div>
        </div>
    </header>

    <main class="pb-24">

        <!-- YODLASH -->
        <div id="tab-flash" class="tab-content active p-5">
            <div id="set-list" class="space-y-4"></div>
            <div id="count-select" class="hidden max-w-md mx-auto glass rounded-3xl p-6"></div>
            <div id="flash-area" class="hidden max-w-md mx-auto">
                <div onclick="flipCard()" id="flashcard" class="flashcard relative h-[460px] cursor-pointer">
                    <div class="face front absolute inset-0 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 flex flex-col justify-center items-center">
                        <div class="px-6 py-2 bg-white/10 rounded-full text-sm">ENGLISH</div>
                        <h1 id="eng-word" class="text-5xl font-bold mt-10 text-center"></h1>
                        <p id="ai-info" class="mt-8 text-center text-slate-200 text-[15px]"></p>
                    </div>
                    <div class="face back absolute inset-0 bg-gradient-to-br from-emerald-600 to-teal-600 rounded-3xl p-8 flex flex-col justify-center items-center rotate-y-180">
                        <div class="px-6 py-2 bg-white/10 rounded-full text-sm">O‘ZBEKCHA</div>
                        <h1 id="uz-word" class="text-5xl font-bold mt-12 text-white text-center"></h1>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-8">
                    <button onclick="cardAction('dont')" class="glass py-6 rounded-3xl text-red-400 font-semibold">❌ Bilmadim</button>
                    <button onclick="cardAction('know')" class="glass py-6 rounded-3xl text-emerald-400 font-semibold">✅ Bildim</button>
                </div>
            </div>
        </div>

        <!-- SO‘Z QO‘SHISH -->
        <div id="tab-add" class="tab-content hidden p-5">
            <div class="max-w-md mx-auto glass rounded-3xl p-8">
                <h2 class="text-3xl font-bold text-center mb-2">➕ So‘z qo‘shish</h2>
                <p id="current-set-display" class="text-cyan-400 text-center mb-6 font-medium"></p>

                <input id="set-name" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-5 mb-6" placeholder="Set nomi (Unit 1)">
                <input id="eng-input" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-5 mb-4" placeholder="Inglizcha so‘z">
                <input id="uz-input" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-5 mb-8" placeholder="O‘zbekcha tarjimasi">

                <div class="flex gap-3">
                    <button onclick="addWordAndContinue()" class="flex-1 bg-slate-700 hover:bg-slate-600 py-6 rounded-3xl font-semibold">➕ Yana qo‘shish</button>
                    <button onclick="finishAddingWords()" class="flex-1 bg-gradient-to-r from-cyan-400 to-blue-500 text-black py-6 rounded-3xl font-bold">✅ Tugatish</button>
                </div>
            </div>
        </div>

        <!-- VOICE, AI, STAT bo'limlari ham qo'shilgan (qisqa) -->
        <div id="tab-voice" class="tab-content hidden p-5">Voice bo'limi</div>
        <div id="tab-ai" class="tab-content hidden p-5">AI Teacher</div>
        <div id="tab-stats" class="tab-content hidden p-5">Statistika</div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-2xl border-t border-slate-700 flex text-xs">
        <div onclick="switchTab(0)" class="flex-1 py-4 flex flex-col items-center nav-item active"><i class="fa-solid fa-layer-group text-2xl"></i><span>Yodlash</span></div>
        <div onclick="switchTab(1)" class="flex-1 py-4 flex flex-col items-center nav-item"><i class="fa-solid fa-plus text-2xl"></i><span>Qo‘shish</span></div>
        <div onclick="switchTab(2)" class="flex-1 py-4 flex flex-col items-center nav-item"><i class="fa-solid fa-microphone text-2xl"></i><span>Voice</span></div>
        <div onclick="switchTab(3)" class="flex-1 py-4 flex flex-col items-center nav-item"><i class="fa-solid fa-robot text-2xl"></i><span>AI</span></div>
        <div onclick="switchTab(4)" class="flex-1 py-4 flex flex-col items-center nav-item"><i class="fa-solid fa-chart-column text-2xl"></i><span>Stat</span></div>
    </nav>

    <script>
        const API_BASE_URL = "https://yodlacards-ai-bot-production.up.railway.app";
        let userId = Telegram.WebApp.initDataUnsafe?.user?.id || 12345;
        let currentFlashcards = [];
        let currentIndex = 0;
        let currentSetName = "";

        async function loadSets() {
            const container = document.getElementById('set-list');
            try {
                const res = await fetch(`\( {API_BASE_URL}/api/user/ \){userId}/sets`);
                const sets = await res.json();
                container.innerHTML = sets.map(s => `
                    <div onclick="selectSet('${s.set_name}', ${s.count})" class="glass rounded-3xl p-6 flex justify-between items-center cursor-pointer hover:scale-[1.02]">
                        <div>
                            <p class="font-semibold text-xl">${s.set_name}</p>
                            <p class="text-slate-400">${s.count} ta so‘z</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-cyan-400"></i>
                    </div>
                `).join('');
            } catch(e) {
                container.innerHTML = `<p class="text-center text-slate-400 py-10">Hozircha set yo'q. Qo'shish bo'limidan boshlang.</p>`;
            }
        }

        function selectSet(setName, count) {
            document.getElementById('set-list').classList.add('hidden');
            const div = document.getElementById('count-select');
            div.classList.remove('hidden');
            div.innerHTML = `
                <h3 class="text-2xl font-bold text-center mb-6">Qancha so‘z yodlamoqchisiz?</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="startFlashcards('${setName}', 10)" class="glass py-6 rounded-2xl">10 ta</button>
                    <button onclick="startFlashcards('${setName}', 20)" class="glass py-6 rounded-2xl">20 ta</button>
                    <button onclick="startFlashcards('${setName}', 50)" class="glass py-6 rounded-2xl">50 ta</button>
                    <button onclick="startFlashcards('${setName}', ${count})" class="glass py-6 rounded-2xl">Hammasi</button>
                </div>
            `;
        }

        async function startFlashcards(setName, limit) {
            document.getElementById('count-select').classList.add('hidden');
            document.getElementById('flash-area').classList.remove('hidden');
            try {
                const res = await fetch(`\( {API_BASE_URL}/api/user/ \){userId}/cards?set=\( {setName}&limit= \){limit}`);
                currentFlashcards = await res.json();
                currentIndex = 0;
                showCurrentCard();
            } catch(e) { console.error(e); }
        }

        function showCurrentCard() {
            const c = currentFlashcards[currentIndex];
            document.getElementById('eng-word').textContent = c.english;
            document.getElementById('ai-info').textContent = c.ai_info || "";
            document.getElementById('uz-word').textContent = c.uzbek;
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }

        async function cardAction(action) {
            const c = currentFlashcards[currentIndex];
            await fetch(`${API_BASE_URL}/api/flashcard/action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, card_id: c.id, action})
            });
            currentIndex = (currentIndex + 1) % currentFlashcards.length;
            showCurrentCard();
        }

        // SO‘Z QO‘SHISH
        async function addWordAndContinue() {
            const set = document.getElementById('set-name').value.trim() || currentSetName || "Umumiy";
            const eng = document.getElementById('eng-input').value.trim();
            const uz = document.getElementById('uz-input').value.trim();

            if (!eng || !uz) return alert("So'zlarni to'ldiring!");

            currentSetName = set;
            document.getElementById('current-set-display').textContent = `Set: ${set}`;

            try {
                await fetch(`\( {API_BASE_URL}/api/user/ \){userId}/add_word`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({set_name: set, english: eng, uzbek: uz})
                });
                alert(`✅ "${eng}" qo'shildi!`);
                document.getElementById('eng-input').value = '';
                document.getElementById('uz-input').value = '';
            } catch(e) { alert("Xatolik yuz berdi"); }
        }

        function finishAddingWords() {
            alert(`✅ "${currentSetName}" seti saqlandi! Yodlash bo'limida uni toping.`);
            switchTab(0);
            loadSets();
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(['tab-flash','tab-add','tab-voice','tab-ai','tab-stats'][n]).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item')[n].classList.add('active');
        }

        window.onload = () => {
            loadSets();
            if (Telegram.WebApp.initDataUnsafe?.user) {
                document.getElementById('username').textContent = Telegram.WebApp.initDataUnsafe.user.first_name;
            }
        };
    </script>
</body>
            </html>
