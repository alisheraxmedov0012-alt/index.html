<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YodlaCards AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .flashcard {
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-hover:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <!-- HEADER -->
    <header class="bg-slate-900 border-b border-cyan-500/20 px-5 py-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold shadow-lg">Y</div>
            <div>
                <p id="username" class="font-semibold text-lg">Foydalanuvchi</p>
                <p class="text-xs text-slate-400 flex items-center gap-1">
                    <i class="fa-solid fa-fire text-orange-400"></i> 
                    <span id="streak">0</span> kun streak
                </p>
            </div>
        </div>
        <div class="text-right">
            <div class="text-cyan-400 text-sm font-medium">Level <span id="level" class="text-2xl font-bold">1</span></div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto pb-24">

        <!-- FLASHCARDS -->
        <div id="tab-flash" class="tab-content p-5 active">
            <div class="max-w-md mx-auto">
                <div onclick="flipCard()" id="flashcard" class="flashcard relative h-[420px] cursor-pointer">
                    <div class="face front absolute inset-0 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-3xl p-8 flex flex-col justify-center items-center shadow-2xl backface-hidden">
                        <span class="px-4 py-1 bg-white/20 text-xs tracking-widest rounded-full">ENGLISH</span>
                        <h1 id="eng-word" class="text-4xl font-bold mt-8 mb-6 text-center">Resilience</h1>
                        <p id="ai-info" class="text-center text-slate-200 text-[15px] leading-relaxed"></p>
                    </div>
                    <div class="face back absolute inset-0 bg-gradient-to-br from-emerald-600 to-teal-600 rounded-3xl p-8 flex flex-col justify-center items-center shadow-2xl rotate-y-180">
                        <span class="px-4 py-1 bg-white/20 text-xs tracking-widest rounded-full">O‘ZBEKCHA</span>
                        <h1 id="uz-word" class="text-4xl font-bold mt-10 text-white text-center"></h1>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-8">
                    <button onclick="cardAction('dont')" 
                            class="bg-red-500/10 hover:bg-red-500/20 text-red-400 font-semibold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-95">
                        <i class="fa-solid fa-xmark"></i> Bilmadim
                    </button>
                    <button onclick="cardAction('know')" 
                            class="bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 font-semibold py-4 rounded-2xl flex items-center justify-center gap-2 transition-all active:scale-95">
                        <i class="fa-solid fa-check"></i> Bildim
                    </button>
                </div>
            </div>
        </div>

        <!-- SO‘Z QO‘SHISH -->
        <div id="tab-add" class="tab-content p-5 hidden">
            <div class="max-w-md mx-auto bg-slate-900 rounded-3xl p-6">
                <h2 class="text-2xl font-bold mb-6">Yangi so‘z qo‘shish</h2>
                <input id="set-name" type="text" class="w-full bg-slate-800 rounded-2xl px-5 py-4 mb-3 focus:outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Set nomi (IELTS, Business...)">
                <input id="eng-input" type="text" class="w-full bg-slate-800 rounded-2xl px-5 py-4 mb-3 focus:outline-none focus:ring-2 focus:ring-cyan-400" placeholder="Inglizcha so‘z">
                <input id="uz-input" type="text" class="w-full bg-slate-800 rounded-2xl px-5 py-4 mb-6 focus:outline-none focus:ring-2 focus:ring-cyan-400" placeholder="O‘zbekcha tarjimasi">
                <button onclick="addWord()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-4 rounded-2xl text-lg transition-all active:scale-95">
                    🤖 AI bilan saqlash
                </button>
            </div>
        </div>

        <!-- VOICE -->
        <div id="tab-voice" class="tab-content p-5 hidden">
            <div class="max-w-md mx-auto text-center">
                <div class="bg-slate-900 rounded-3xl p-10">
                    <button onclick="startVoiceRecording()" id="voice-btn"
                            class="w-32 h-32 mx-auto rounded-full bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-5xl shadow-xl hover:scale-110 transition-transform">
                        🎤
                    </button>
                    <p class="mt-8 text-lg font-medium">Talaffuzni tekshiring</p>
                    <p id="recognized-text" class="mt-6 text-slate-300 min-h-[80px]"></p>
                </div>
            </div>
        </div>

        <!-- AI TEACHER -->
        <div id="tab-ai" class="tab-content p-5 hidden">
            <div class="max-w-md mx-auto">
                <div id="chat-messages" class="h-[55vh] overflow-y-auto space-y-4 pb-4"></div>
                <div class="flex gap-3 bg-slate-900 p-3 rounded-3xl">
                    <input id="ai-input" type="text" placeholder="Inglizcha yozing..." 
                           class="flex-1 bg-slate-800 rounded-2xl px-5 py-4 focus:outline-none">
                    <button onclick="sendAiMessage()" class="bg-cyan-500 text-black px-8 rounded-2xl font-bold">Yuborish</button>
                </div>
            </div>
        </div>

        <!-- STATISTIKA -->
        <div id="tab-stats" class="tab-content p-5 hidden">
            <div class="max-w-md mx-auto bg-slate-900 rounded-3xl p-6 space-y-6">
                <h2 class="text-2xl font-bold">Sizning natijalaringiz</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800 rounded-2xl p-5">
                        <p class="text-slate-400 text-sm">Daraja</p>
                        <p id="stat-level" class="text-5xl font-bold text-cyan-400">1</p>
                    </div>
                    <div class="bg-slate-800 rounded-2xl p-5">
                        <p class="text-slate-400 text-sm">XP</p>
                        <p id="stat-xp" class="text-5xl font-bold">1240</p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between"><span>Tangalar</span><span id="stat-coins" class="font-bold">245 🪙</span></div>
                    <div class="flex justify-between"><span>Streak</span><span id="stat-streak" class="font-bold">7 🔥 kun</span></div>
                    <div class="flex justify-between"><span>Jami so‘zlar</span><span id="stat-words" class="font-bold">68 ta</span></div>
                </div>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-700 flex text-xs">
        <div onclick="switchTab(0)" class="flex-1 py-3 flex flex-col items-center text-cyan-400 nav-item active">
            <i class="fa-solid fa-layer-group text-xl"></i>
            <span class="mt-1">Yodlash</span>
        </div>
        <div onclick="switchTab(1)" class="flex-1 py-3 flex flex-col items-center text-slate-400 nav-item">
            <i class="fa-solid fa-plus text-xl"></i>
            <span class="mt-1">Qo‘shish</span>
        </div>
        <div onclick="switchTab(2)" class="flex-1 py-3 flex flex-col items-center text-slate-400 nav-item">
            <i class="fa-solid fa-microphone text-xl"></i>
            <span class="mt-1">Voice</span>
        </div>
        <div onclick="switchTab(3)" class="flex-1 py-3 flex flex-col items-center text-slate-400 nav-item">
            <i class="fa-solid fa-robot text-xl"></i>
            <span class="mt-1">AI</span>
        </div>
        <div onclick="switchTab(4)" class="flex-1 py-3 flex flex-col items-center text-slate-400 nav-item">
            <i class="fa-solid fa-chart-column text-xl"></i>
            <span class="mt-1">Stat</span>
        </div>
    </nav>

    <script>
        const tg = Telegram.WebApp;
        tg.ready(); tg.expand();

        const API_BASE_URL = "https://yodlacards-ai-bot-production.up.railway.app";
        let userId = tg.initDataUnsafe?.user?.id || 12345;
        let flashcards = [];
        let currentIndex = 0;

        async function loadData() {
            try {
                const [cardsRes, statsRes] = await Promise.all([
                    fetch(`\( {API_BASE_URL}/api/user/ \){userId}/cards`),
                    fetch(`\( {API_BASE_URL}/api/user/ \){userId}/stats`)
                ]);
                flashcards = await cardsRes.json();
                if (flashcards.length) showCard();

                const stats = await statsRes.json();
                document.getElementById('stat-level').textContent = stats.level;
                document.getElementById('stat-xp').textContent = stats.xp;
                document.getElementById('stat-coins').textContent = stats.coins;
                document.getElementById('stat-streak').textContent = stats.streak;
                document.getElementById('stat-words').textContent = stats.total_words;
            } catch(e) { console.error(e); }
        }

        function showCard() {
            const c = flashcards[currentIndex];
            document.getElementById('eng-word').textContent = c.english;
            document.getElementById('ai-info').textContent = c.ai_info || "AI tushuntirishi";
            document.getElementById('uz-word').textContent = c.uzbek;
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        async function cardAction(action) {
            const c = flashcards[currentIndex];
            await fetch(`${API_BASE_URL}/api/flashcard/action`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId, card_id: c.id, action})
            });
            currentIndex = (currentIndex + 1) % flashcards.length;
            showCard();
        }

        async function addWord() {
            const eng = document.getElementById('eng-input').value.trim();
            const uz = document.getElementById('uz-input').value.trim();
            if (!eng || !uz) return alert("So‘z va tarjimani kiriting!");

            const res = await fetch(`${API_BASE_URL}/api/ai-teacher`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: `Detailed explanation for: ${eng}`})
            });
            const data = await res.json();
            alert(`✅ "\( {eng}" muvaffaqiyatli qo‘shildi!\n\n \){data.response.substring(0, 100)}...`);
            loadData();
        }

        let recorder;
        async function startVoiceRecording() {
            const btn = document.getElementById('voice-btn');
            if (recorder) { recorder.stop(); btn.innerHTML = '🎤'; return; }

            const stream = await navigator.mediaDevices.getUserMedia({audio: true});
            recorder = new MediaRecorder(stream);
            recorder.ondataavailable = () => {};
            recorder.onstop = () => {
                document.getElementById('recognized-text').innerHTML = `<span class="text-emerald-400">✅ Yozildi! AI tahlil qilmoqda...</span>`;
            };
            recorder.start();
            btn.innerHTML = '⏹';
        }

        async function sendAiMessage() {
            const input = document.getElementById('ai-input');
            const text = input.value.trim();
            if (!text) return;

            const box = document.getElementById('chat-messages');
            box.innerHTML += `<div class="text-right"><div class="inline-block bg-cyan-600 text-white px-5 py-3 rounded-3xl rounded-br-none">${text}</div></div>`;

            const res = await fetch(`${API_BASE_URL}/api/ai-teacher`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text})
            });
            const data = await res.json();

            box.innerHTML += `<div><div class="inline-block bg-slate-700 px-5 py-3 rounded-3xl rounded-bl-none">${data.response}</div></div>`;
            box.scrollTop = box.scrollHeight;
            input.value = '';
        }

        function switchTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(['tab-flash','tab-add','tab-voice','tab-ai','tab-stats'][n]).classList.remove('hidden');

            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('text-cyan-400', 'active'));
            document.querySelectorAll('.nav-item')[n].classList.add('text-cyan-400', 'active');
        }

        window.onload = () => {
            loadData();
            if (tg.initDataUnsafe?.user) {
                document.getElementById('username').textContent = tg.initDataUnsafe.user.first_name;
            }
        };
    </script>
</body>
</html>
