<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YodlaCards AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(34, 211, 238, 0.2); }
        .flashcard { transition: transform 0.85s cubic-bezier(0.23, 1, 0.32, 1); transform-style: preserve-3d; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .face { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen">

    <header class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur-xl border-b border-cyan-400/20 px-5 py-4">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-3xl flex items-center justify-center text-3xl font-black">Y</div>
                <div>
                    <p id="username" class="text-xl font-bold">Alisher</p>
                    <p class="text-xs text-slate-400"><i class="fa-solid fa-fire"></i> <span id="streak">0</span> kun</p>
                </div>
            </div>
            <div class="text-cyan-400">Level <span id="level" class="text-3xl font-bold">1</span></div>
        </div>
    </header>

    <main class="pb-24">

        <!-- YODLASH BO'LIMI -->
        <div id="tab-flash" class="tab-content active p-5">
            <div id="set-list" class="space-y-4"></div>
            <div id="count-select" class="hidden max-w-md mx-auto glass rounded-3xl p-6"></div>
            <div id="flash-area" class="hidden max-w-md mx-auto">
                <div onclick="flipCard()" id="flashcard" class="flashcard relative h-[460px] cursor-pointer">
                    <div class="face front absolute inset-0 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 flex flex-col justify-center items-center">
                        <div class="px-6 py-2 bg-white/10 rounded-full text-sm">ENGLISH</div>
                        <h1 id="eng-word" class="text-5xl font-bold mt-10 text-center"></h1>
                        <p id="ai-info" class="mt-8 text-center text-slate-200"></p>
                    </div>
                    <div class="face back absolute inset-0 bg-gradient-to-br from-emerald-600 to-teal-600 rounded-3xl p-8 flex flex-col justify-center items-center rotate-y-180">
                        <div class="px-6 py-2 bg-white/10 rounded-full text-sm">O‘ZBEKCHA</div>
                        <h1 id="uz-word" class="text-5xl font-bold mt-12 text-white text-center"></h1>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-8">
                    <button onclick="cardAction('dont')" class="glass py-6 rounded-3xl text-red-400 font-semibold">❌ Bilmadim</button>
                    <button onclick="cardAction('know')" class="glass py-6 rounded-3xl text-emerald-400 font-semibold">✅ Bildim</button>
                </div>
            </div>
        </div>

        <!-- SO‘Z QO‘SHISH BO'LIMI -->
        <div id="tab-add" class="tab-content hidden p-5">
            <div class="max-w-md mx-auto glass rounded-3xl p-8">
                <h2 class="text-3xl font-bold text-center mb-2">➕ So‘z qo‘shish</h2>
                <p id="current-set-display" class="text-cyan-400 text-center mb-6 font-medium"></p>

                <input id="set-name" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-5 mb-6" placeholder="Set nomi">
                <input id="eng-input" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-5 mb-4" placeholder="Inglizcha so‘z">
                <input id="uz-input" class="w-full bg-slate-800 border border-slate-600 rounded-2xl px-6 py-5 mb-8" placeholder="O‘zbekcha tarjimasi">

                <div class="flex gap-3">
                    <button onclick="addWordAndContinue()" class="flex-1 bg-slate-700 py-6 rounded-3xl font-semibold">➕ Yana qo‘shish</button>
                    <button onclick="finishAddingWords()" class="flex-1 bg-gradient-to-r from-cyan-400 to-blue-500 text-black py-6 rounded-3xl font-bold">✅ Tugatish</button>
                </div>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900/95 backdrop-blur-2xl border-t border-slate-700 flex text-xs z-50">
        <div onclick="switchTab(0)" class="flex-1 py-4 flex flex-col items-center nav-item active cursor-pointer text-cyan-400"><i class="fa-solid fa-layer-group text-2xl mb-1"></i><span>Yodlash</span></div>
        <div onclick="switchTab(1)" class="flex-1 py-4 flex flex-col items-center nav-item cursor-pointer text-slate-400"><i class="fa-solid fa-plus text-2xl mb-1"></i><span>Qo‘shish</span></div>
    </nav>

    <script>
        const API_BASE_URL = "https://yodlacards-ai-bot-production.up.railway.app";
        let userId = Telegram.WebApp.initDataUnsafe?.user?.id || 12345;
        let currentFlashcards = [];
        let currentIndex = 0;
        let currentSetName = "";

        // Setlarni yuklash
        async function loadSets() {
            const container = document.getElementById('set-list');
            
            // Ekran holatini tozalaymiz (yashirin elementlarni joyiga qaytaramiz)
            container.classList.remove('hidden');
            document.getElementById('count-select').classList.add('hidden');
            document.getElementById('flash-area').classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE_URL}/api/user/${userId}/sets`);
                const sets = await res.json();
                if (!sets || sets.length === 0) throw new Error();
                
                container.innerHTML = sets.map(s => `
                    <div onclick="selectSet('${s.set_name}', ${s.count})" class="glass rounded-3xl p-6 flex justify-between items-center cursor-pointer hover:border-cyan-400/50 transition">
                        <div>
                            <p class="font-semibold text-xl">${s.set_name}</p>
                            <p class="text-slate-400">${s.count} ta so‘z</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-cyan-400"></i>
                    </div>
                `).join('');
            } catch(e) {
                container.innerHTML = `<p class="text-center text-slate-400 py-10">Hozircha set yo'q. "Qo‘shish" bo‘limidan so‘z qo‘shing.</p>`;
            }
        }

        // Qancha so'z yodlashni tanlash ekrani
        function selectSet(setName, count) {
            document.getElementById('set-list').classList.add('hidden');
            const div = document.getElementById('count-select');
            div.classList.remove('hidden');
            div.innerHTML = `
                <h3 class="text-2xl font-bold text-center mb-6">Qancha so‘z yodlamoqchisiz?</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="startFlashcards('${setName}', 10)" class="glass py-6 rounded-2xl hover:bg-slate-800 transition">10 ta</button>
                    <button onclick="startFlashcards('${setName}', 20)" class="glass py-6 rounded-2xl hover:bg-slate-800 transition">20 ta</button>
                    <button onclick="startFlashcards('${setName}', 50)" class="glass py-6 rounded-2xl hover:bg-slate-800 transition">50 ta</button>
                    <button onclick="startFlashcards('${setName}', ${count})" class="glass py-6 rounded-2xl hover:bg-slate-800 transition">Hammasi</button>
                </div>
            `;
        }

        // Flashcard o'yinini boshlash
        async function startFlashcards(setName, limit) {
            document.getElementById('count-select').classList.add('hidden');
            document.getElementById('flash-area').classList.remove('hidden');
            try {
                const res = await fetch(`${API_BASE_URL}/api/user/${userId}/cards?set=${setName}&limit=${limit}`);
                currentFlashcards = await res.json();
                currentIndex = 0;
                showCurrentCard();
            } catch(e) { console.error(e); }
        }

        // Faol kartani ko'rsatish
        function showCurrentCard() {
            if (currentFlashcards.length === 0) {
                alert("Bu setda so'zlar topilmadi.");
                loadSets();
                return;
            }
            // Kartani o'girilgan bo'lsa oldi tomonga qaytaramiz
            document.getElementById('flashcard').classList.remove('flipped');
            
            const c = currentFlashcards[currentIndex];
            document.getElementById('eng-word').textContent = c.english;
            document.getElementById('ai-info').textContent = c.ai_info || "";
            document.getElementById('uz-word').textContent = c.uzbek;
        }

        // Kartani o'girish
        function flipCard() { 
            document.getElementById('flashcard').classList.toggle('flipped'); 
        }

        // Bildim / Bilmadim tugmalari logikasi
        async function cardAction(action) {
            const c = currentFlashcards[currentIndex];
            try {
                await fetch(`${API_BASE_URL}/api/flashcard/action`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: userId, card_id: c.id, action})
                });
            } catch(e) { console.error(e); }

            currentIndex = (currentIndex + 1) % currentFlashcards.length;
            showCurrentCard();
        }

        // So'z qo'shish va davom etish
        async function addWordAndContinue() {
            const set = document.getElementById('set-name').value.trim() || currentSetName || "Umumiy";
            const eng = document.getElementById('eng-input').value.trim();
            const uz = document.getElementById('uz-input').value.trim();

            if (!eng || !uz) return alert("So'zlarni to'ldiring!");

            currentSetName = set;
            document.getElementById('current-set-display').textContent = `Set: ${set}`;

            try {
                const response = await fetch(`${API_BASE_URL}/api/user/${userId}/add_word`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({set_name: set, english: eng, uzbek: uz})
                });
                
                if (response.ok) {
                    alert(`✅ "${eng}" muvaffaqiyatli qo'shildi!`);
                    document.getElementById('eng-input').value = '';
                    document.getElementById('uz-input').value = '';
                } else {
                    alert("Xatolik yuz berdi. Backend javob bermadi.");
                }
            } catch(e) { 
                alert("Xatolik yuz berdi. Tarmoqni yoki backendni tekshiring."); 
            }
        }

        // So'z qo'shishni tugatish va Yodlash bo'limiga qaytish
        function finishAddingWords() {
            alert(`✅ "${currentSetName || 'Umumiy'}" seti saqlandi!`);
            
            // Inputlarni va keshni tozalash
            document.getElementById('set-name').value = '';
            document.getElementById('eng-input').value = '';
            document.getElementById('uz-input').value = '';
            document.getElementById('current-set-display').textContent = '';
            currentSetName = "";

            switchTab(0); // Yodlash bo'limiga o'tish
            loadSets();   // Ro'yxatni yangitdan yuklash va ekranda ko'rsatish
        }

        // Tablarni almashtirish logikasi (Navigatsiya)
        function switchTab(n) {
            const tabs = document.querySelectorAll('.tab-content');
            const navItems = document.querySelectorAll('.nav-item');
            
            tabs.forEach(el => el.classList.add('hidden'));
            tabs[n].classList.remove('hidden');

            // Navigatsiya tugmalari rangini yangilash
            navItems.forEach((item, index) => {
                if(index === n) {
                    item.classList.add('text-cyan-400');
                    item.classList.remove('text-slate-400');
                } else {
                    item.classList.remove('text-cyan-400');
                    item.classList.add('text-slate-400');
                }
            });

            if (n === 0) {
                loadSets(); // Yodlash bo'limiga o'tganda ro'yxatni avtomat yangilash
            }
        }

        // Ilk yuklanish jarayoni
        window.onload = () => {
            loadSets();
            if (Telegram.WebApp.initDataUnsafe?.user) {
                document.getElementById('username').textContent = Telegram.WebApp.initDataUnsafe.user.first_name;
            }
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        };
    </script>
</body>
</html>
